name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A28219: ${{ secrets.A28219 }}
          B8EB85: ${{ secrets.B8EB85 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A28219', '')
          bm = os.environ.get('B8EB85', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 6a1a17590546c7a8910337d923e960e05212a270aba0d80a -->', gm)
              s2 = s2.replace('<!-- 6c114d6851dab418545502f3d0aa3044 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
